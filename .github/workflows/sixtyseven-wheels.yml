name: Build 67 Wheels

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build web UI
        working-directory: web
        run: npm ci && npm run build

      - name: Build sixtyseven binary
        if: runner.os != 'Windows'
        working-directory: .
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o sixtyseven ./cmd/sixtyseven

      - name: Build sixtyseven binary (Windows)
        if: runner.os == 'Windows'
        working-directory: .
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o sixtyseven.exe ./cmd/sixtyseven

      - name: Stage binary into Python package
        run: python sdk/python/scripts/stage_binary.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel (macOS/Windows)
        if: runner.os != 'Linux'
        working-directory: sdk/python
        run: uv build --wheel --out-dir dist

      - name: Install cibuildwheel (Linux)
        if: runner.os == 'Linux'
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheel (manylinux)
        if: runner.os == 'Linux'
        env:
          CIBW_MANYLINUX_X86_64: manylinux2014
        run: python -m cibuildwheel sdk/python --output-dir sdk/python/dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: sixtyseven-wheels-${{ runner.os }}
          path: sdk/python/dist/*.whl

  publish:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: sixtyseven-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        run: uv publish dist/*.whl
